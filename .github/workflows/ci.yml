name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint (fast) ──────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run

  # ── Binary ───────────────────────────────────────────────────────────────────
  # Produces a statically-linked musl binary that runs on any Linux without
  # glibc version constraints. Uses thin LTO for CI speed; the release Makefile
  # target uses the full fat-LTO profile for shipped binaries.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl toolchain
        run: sudo apt-get install -y musl-tools
      - run: rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - name: Build
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
        run: cargo build --release --target x86_64-unknown-linux-musl
      - run: tar czf qunitx-linux-musl.tar.gz -C target/x86_64-unknown-linux-musl/release qunitx
      - uses: actions/upload-artifact@v4
        with:
          name: qunitx-linux-musl
          path: qunitx-linux-musl.tar.gz
          retention-days: 7

  # ── Docker image ─────────────────────────────────────────────────────────────
  # Downloads the pre-built musl binary from the build job and copies it into
  # Alpine via --target prebuilt — no Rust compilation inside Docker.
  #
  # Push policy:
  #   - main branch  → ghcr.io/.../qunitx:nightly + sha-<hash>
  #   - other branches / same-repo PRs → ghcr.io/.../qunitx:<branch> or pr-<n>
  #   - fork PRs → build only, no push (fork tokens lack GHCR write access)
  package:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Login is skipped for fork PRs — their GITHUB_TOKEN cannot write to the
      # upstream registry. Same-repo PRs and all push events have write access.
      - uses: docker/login-action@v3
        if: >-
          github.event_name == 'push' ||
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags:
      #   push to main  → nightly + sha-<hash>
      #   push to branch → <branch-name> + sha-<hash>
      #   same-repo PR   → pr-<number> + sha-<hash>
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      - uses: actions/download-artifact@v4
        with:
          name: qunitx-linux-musl
          path: dist
      - run: tar xzf dist/qunitx-linux-musl.tar.gz -C dist

      - uses: docker/build-push-action@v6
        with:
          context: dist
          file: Dockerfile
          target: prebuilt
          push: >-
            ${{
              github.event_name == 'push' ||
              github.event.pull_request.head.repo.full_name == github.repository
            }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
